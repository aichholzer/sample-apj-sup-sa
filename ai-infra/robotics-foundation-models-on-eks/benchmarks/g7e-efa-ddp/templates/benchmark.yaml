apiVersion: v1
kind: Service
metadata:
  name: @@RUN_NAME@@-master
  labels:
    app.kubernetes.io/name: @@RUN_NAME@@
spec:
  selector:
    app.kubernetes.io/name: @@RUN_NAME@@
    app.kubernetes.io/component: master
  ports:
    - name: rendezvous
      port: 29500
      targetPort: 29500
---
apiVersion: v1
kind: Pod
metadata:
  name: @@RUN_NAME@@-worker
  labels:
    app.kubernetes.io/name: @@RUN_NAME@@
    app.kubernetes.io/component: worker
spec:
  restartPolicy: Never
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    aws.osmo.reference/nodepool: g7e
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: @@RUN_NAME@@
          topologyKey: kubernetes.io/hostname
  containers:
    - name: train
      image: @@IMAGE@@
      imagePullPolicy: IfNotPresent
      env:
        - name: NCCL_DEBUG
          value: INFO
        - name: NCCL_DEBUG_SUBSYS
          value: INIT,NET
@@MODE_ENV@@
      resources:
        requests:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
@@MODE_RESOURCE@@
        limits:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
@@MODE_RESOURCE@@
      volumeMounts:
        - name: training-script
          mountPath: /workspace
        - name: shmem
          mountPath: /dev/shm
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail
          python -m torch.distributed.run \
            --nnodes=2 \
            --nproc_per_node=1 \
            --node_rank=1 \
            --master_addr=@@RUN_NAME@@-master \
            --master_port=29500 \
            /workspace/train.py \
            --mode @@MODE@@ \
            --param-mib @@PARAM_MIB@@ \
            --warmup-steps @@WARMUP_STEPS@@ \
            --steps @@STEPS@@ \
            --bucket-cap-mb @@BUCKET_CAP_MB@@
  volumes:
    - name: training-script
      configMap:
        name: @@RUN_NAME@@-script
    - name: shmem
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi
---
