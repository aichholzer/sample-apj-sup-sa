apiVersion: v1
kind: Pod
metadata:
  name: @@POD_NAME@@
  labels:
    app.kubernetes.io/name: @@RUN_NAME@@
    app.kubernetes.io/component: @@ROLE@@
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
@@IMAGE_PULL_SECRETS@@
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    "@@NODE_SELECTOR_KEY@@": "@@NODE_SELECTOR_VALUE@@"
@@POD_ANTI_AFFINITY@@
  containers:
    - name: train
      image: @@IMAGE@@
      imagePullPolicy: IfNotPresent
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: @@SECRET_NAME@@
              key: token
        - name: NODE_RANK
          value: "@@NODE_RANK@@"
        - name: WORLD_SIZE
          value: "@@WORLD_SIZE@@"
        - name: GPUS_PER_NODE
          value: "@@GPUS_PER_NODE@@"
        - name: MASTER_ADDR
          value: "@@MASTER_POD@@"
        - name: MASTER_PORT
          value: "@@MASTER_PORT@@"
        - name: RUN_NAME
          value: "@@RUN_NAME@@"
        - name: IMAGE_NAME
          value: "@@IMAGE@@"
        - name: GR00T_REPOSITORY
          value: "@@GR00T_REPOSITORY@@"
        - name: GR00T_REF
          value: "@@GR00T_REF@@"
        - name: BASE_MODEL_PATH
          value: "@@BASE_MODEL_PATH@@"
        - name: DATASET_PATH
          value: "@@DATASET_PATH@@"
        - name: MODALITY_CONFIG_PATH
          value: "@@MODALITY_CONFIG_PATH@@"
        - name: EMBODIMENT_TAG
          value: "@@EMBODIMENT_TAG@@"
        - name: MAX_STEPS
          value: "@@MAX_STEPS@@"
        - name: SAVE_STEPS
          value: "@@SAVE_STEPS@@"
        - name: SAVE_TOTAL_LIMIT
          value: "@@SAVE_TOTAL_LIMIT@@"
        - name: GLOBAL_BATCH_SIZE
          value: "@@GLOBAL_BATCH_SIZE@@"
        - name: DATALOADER_NUM_WORKERS
          value: "@@DATALOADER_NUM_WORKERS@@"
        - name: LEARNING_RATE
          value: "@@LEARNING_RATE@@"
        - name: SHARD_SIZE
          value: "@@SHARD_SIZE@@"
        - name: EPISODE_SAMPLING_RATE
          value: "@@EPISODE_SAMPLING_RATE@@"
        - name: NUM_SHARDS_PER_EPOCH
          value: "@@NUM_SHARDS_PER_EPOCH@@"
        - name: NODE_SELECTOR_KEY
          value: "@@NODE_SELECTOR_KEY@@"
        - name: NODE_SELECTOR_VALUE
          value: "@@NODE_SELECTOR_VALUE@@"
        - name: GPU_METRICS_INTERVAL_SECONDS
          value: "@@GPU_METRICS_INTERVAL_SECONDS@@"
        - name: HOLD_FOR_ARTIFACT_COPY
          value: "true"
        - name: FI_PROVIDER
          value: efa
        - name: FI_EFA_USE_DEVICE_RDMA
          value: "@@FI_EFA_USE_DEVICE_RDMA@@"
        - name: NCCL_DEBUG
          value: INFO
        - name: NCCL_DEBUG_SUBSYS
          value: INIT,NET
@@OPTIONAL_NCCL_ENV@@
      resources:
        requests:
          cpu: "@@CPU_REQUEST@@"
          memory: @@MEMORY_REQUEST@@
          nvidia.com/gpu: "1"
@@EPHEMERAL_STORAGE@@
@@EFA_RESOURCE@@
        limits:
          cpu: "@@CPU_REQUEST@@"
          memory: @@MEMORY_REQUEST@@
          nvidia.com/gpu: "1"
@@EPHEMERAL_STORAGE@@
@@EFA_RESOURCE@@
      volumeMounts:
        - name: scripts
          mountPath: /workspace
        - name: shmem
          mountPath: /dev/shm
      command:
        - /bin/bash
        - /workspace/entry.sh
  volumes:
    - name: scripts
      configMap:
        name: @@CONFIGMAP_NAME@@
        defaultMode: 0755
    - name: shmem
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
