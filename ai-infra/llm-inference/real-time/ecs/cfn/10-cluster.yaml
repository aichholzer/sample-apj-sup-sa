AWSTemplateFormatVersion: "2010-09-09"
Description: >
  llm-inference real-time/ecs cluster + GPU capacity providers (one-time per region).
  Builds: ECS cluster, two GPU ASGs (spot + on-demand), two capacity providers
  with managed scaling + managed termination protection enabled, and a default
  4:1 spot:on-demand strategy.

Parameters:
  ResourcePrefix:
    Type: String
    Default: llm-inference-rt
  InstanceType:
    Type: String
    Default: g7e.2xlarge
    Description: GPU instance type for the ECS-on-EC2 ASG.
  MinSize:
    Type: Number
    Default: 0
  MaxSize:
    Type: Number
    Default: 8
  RootVolumeSizeGiB:
    Type: Number
    Default: 300
    MinValue: 100
    Description: >
      Root EBS volume size for each GPU instance, in GiB. Must be large enough
      to hold the ECS-optimized AMI (~10 GiB), the vLLM container image
      (~10 GiB), AND the entire HuggingFace weight cache for the model. Llama-4
      Scout-17B-16E is ~218 GiB at BF16, so 300 GiB is the safe default for
      this lineup. For Qwen3-8B alone, 150 GiB is fine.
  EcsGpuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ecs/optimized-ami/amazon-linux-2023/gpu/recommended/image_id

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ResourcePrefix}-cluster"
      ClusterSettings:
        - {Name: containerInsights, Value: enhanced}
      Tags:
        - {Key: Project, Value: llm-inference}

  EcsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EcsInstanceRole]

  GpuTaskSg:
    # vLLM GPU tasks live in Cloud Map (not behind the ALB). Their actual
    # client is the LiteLLM Fargate router, whose SG is created in stack 30
    # (30-litellm-router.yaml). To avoid a cross-stack circular dependency,
    # ingress from the router is added by the LiteLLM stack via a separate
    # AWS::EC2::SecurityGroupIngress resource that references this SG by id.
    # No baseline ingress is opened here.
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: vLLM GPU task SG (ingress added by router stack)
      VpcId:
        Fn::ImportValue: !Sub "${ResourcePrefix}-vpc"
      Tags:
        - {Key: Project, Value: llm-inference}

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ResourcePrefix}-lt"
      LaunchTemplateData:
        ImageId: !Ref EcsGpuAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile: {Arn: !GetAtt EcsInstanceProfile.Arn}
        SecurityGroupIds: [!Ref GpuTaskSg]
        # Force IMDSv2: HttpTokens=required + a 2-hop limit so a containerized
        # task can still reach IMDS through the ECS agent.
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGiB
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            echo "ECS_CLUSTER=${ResourcePrefix}-cluster" >> /etc/ecs/ecs.config
            echo "ECS_ENABLE_GPU_SUPPORT=true" >> /etc/ecs/ecs.config
            echo "ECS_AVAILABLE_LOGGING_DRIVERS=[\"awslogs\",\"json-file\"]" >> /etc/ecs/ecs.config
            echo "ECS_RESERVED_MEMORY=512" >> /etc/ecs/ecs.config
            echo "ECS_ENABLE_CONTAINER_METADATA=true" >> /etc/ecs/ecs.config
            # The ECS agent caps task-definition StopTimeout at 30s by
            # default, regardless of what the task definition declares.
            # The vLLM task definition sets StopTimeout=600 to match
            # LiteLLM's 600s upstream per-attempt timeout, so an in-flight
            # decode can drain before SIGKILL on scale-in / replacement.
            # Without bumping the agent's ECS_CONTAINER_STOP_TIMEOUT, the
            # task-definition value is silently truncated to 30s and
            # in-flight requests get RST'd at SIGTERM+30s anyway.
            echo "ECS_CONTAINER_STOP_TIMEOUT=600s" >> /etc/ecs/ecs.config
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - {Key: Project, Value: llm-inference}

  AsgSpot:
    Type: AWS::AutoScaling::AutoScalingGroup
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 0
        MaxBatchSize: 1
    Properties:
      AutoScalingGroupName: !Sub "${ResourcePrefix}-asg-spot"
      VPCZoneIdentifier: !Split
        - ","
        - Fn::ImportValue: !Sub "${ResourcePrefix}-private-subnets"
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: 0
      NewInstancesProtectedFromScaleIn: true
      MixedInstancesPolicy:
        InstancesDistribution:
          OnDemandBaseCapacity: 0
          OnDemandPercentageAboveBaseCapacity: 0
          SpotAllocationStrategy: price-capacity-optimized
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref LaunchTemplate
            Version: !GetAtt LaunchTemplate.LatestVersionNumber
          Overrides:
            - {InstanceType: !Ref InstanceType}
      Tags:
        - {Key: Project, Value: llm-inference, PropagateAtLaunch: true}
        - {Key: AmazonECSManaged, Value: "true", PropagateAtLaunch: true}

  AsgOnDemand:
    Type: AWS::AutoScaling::AutoScalingGroup
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 0
        MaxBatchSize: 1
    Properties:
      AutoScalingGroupName: !Sub "${ResourcePrefix}-asg-od"
      VPCZoneIdentifier: !Split
        - ","
        - Fn::ImportValue: !Sub "${ResourcePrefix}-private-subnets"
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: 0
      NewInstancesProtectedFromScaleIn: true
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - {Key: Project, Value: llm-inference, PropagateAtLaunch: true}
        - {Key: AmazonECSManaged, Value: "true", PropagateAtLaunch: true}

  CapProvSpot:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: !Sub "${ResourcePrefix}-cp-spot"
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Ref AsgSpot
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 4
        ManagedTerminationProtection: ENABLED
      Tags: [{Key: Project, Value: llm-inference}]

  CapProvOd:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: !Sub "${ResourcePrefix}-cp-od"
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Ref AsgOnDemand
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 4
        ManagedTerminationProtection: ENABLED
      Tags: [{Key: Project, Value: llm-inference}]

  ClusterCapProvAssoc:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref Cluster
      CapacityProviders: [!Ref CapProvSpot, !Ref CapProvOd]
      DefaultCapacityProviderStrategy:
        - {CapacityProvider: !Ref CapProvSpot, Weight: 4, Base: 0}
        - {CapacityProvider: !Ref CapProvOd,   Weight: 1, Base: 0}

Outputs:
  ClusterName:
    Value: !Ref Cluster
    Export: {Name: !Sub "${ResourcePrefix}-cluster"}
  GpuTaskSgId:
    Value: !Ref GpuTaskSg
    Export: {Name: !Sub "${ResourcePrefix}-gpu-task-sg"}
  CapProvSpotName:
    Value: !Ref CapProvSpot
    Export: {Name: !Sub "${ResourcePrefix}-cp-spot"}
  CapProvOdName:
    Value: !Ref CapProvOd
    Export: {Name: !Sub "${ResourcePrefix}-cp-od"}
