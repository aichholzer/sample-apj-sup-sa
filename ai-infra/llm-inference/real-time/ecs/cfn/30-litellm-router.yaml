AWSTemplateFormatVersion: "2010-09-09"
Description: >
  llm-inference real-time/ecs LiteLLM router on Fargate, fronted by the shared ALB.
  Resolves to the vLLM model service via Cloud Map (MULTIVALUE A records, TTL=10).

Parameters:
  ResourcePrefix:
    Type: String
    Default: llm-inference-rt
  ModelName:
    Type: String
    Description: Matches the ModelName used in the 20-vllm-model.yaml stack.
  ServedModelName:
    Type: String
  LiteLLMImage:
    Type: String
    Default: "ghcr.io/berriai/litellm:main-stable"
  LiteLLMMasterKeySecretArn:
    Type: String
    Description: Secrets Manager ARN holding the LiteLLM master key.
  VllmApiKeySecretArn:
    Type: String
    Description: Same vLLM bearer token used by the model stack.
  AlbListenerPriority:
    Type: Number
    Default: 100
  PathPrefix:
    Type: String
    Default: "/*"
    Description: >
      ALB path-pattern this router serves on. ALB path-patterns are literal
      matches (with * as wildcard), so use "/*" to take all traffic, or
      "/<model-name>/*" to scope per-model. A bare "/" matches only the
      literal root path.
  ListenerProtocol:
    Type: String
    Default: HTTPS
    AllowedValues: [HTTP, HTTPS]
    Description: >
      Which ALB listener protocol the supplied ListenerArn corresponds to.
      Production deploys use HTTPS (the only listener the prod networking
      template ships). HTTP is for the dev networking template only.
  ListenerArn:
    Type: String
    Default: ""
    Description: >
      Optional ALB Listener ARN this router rule attaches to. If empty,
      the router imports the listener from the networking stack via
      Fn::ImportValue (matching the ListenerProtocol parameter). Pass an
      explicit ARN if you have multiple networking stacks or want to
      avoid the cross-stack export.
  LogGroupKmsKeyArn:
    Type: String
    Default: ""
    Description: >
      Optional KMS key ARN for at-rest encryption of the CloudWatch Log
      Group. Defaults to AWS-managed encryption.

Conditions:
  UseHttps: !Equals [!Ref ListenerProtocol, HTTPS]
  UseExplicitListenerArn: !Not [!Equals [!Ref ListenerArn, ""]]
  HasLogGroupKmsKey: !Not [!Equals [!Ref LogGroupKmsKeyArn, ""]]

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    # CloudWatch Logs encrypts log data at rest using AWS-managed keys by
    # default. Pass LogGroupKmsKeyArn to use a customer-managed CMK.
    Properties:
      LogGroupName: !Sub "/ecs/${ResourcePrefix}/litellm-${ModelName}"
      RetentionInDays: 14
      KmsKeyId: !If [HasLogGroupKmsKey, !Ref LogGroupKmsKeyArn, !Ref AWS::NoValue]
      Tags:
        - {Key: Project, Value: llm-inference}
        - {Key: Model, Value: !Ref ModelName}

  ReadSecretsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-litellm-${ModelName}-read-secrets"
      Description: !Sub "Read the LiteLLM master key + vLLM API key for ${ModelName}."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: [secretsmanager:GetSecretValue]
            Resource:
              - !Ref LiteLLMMasterKeySecretArn
              - !Ref VllmApiKeySecretArn

  TaskExecRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - !Ref ReadSecretsPolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole

  RouterSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM Fargate task SG (ALB ingress only)
      VpcId:
        Fn::ImportValue: !Sub "${ResourcePrefix}-vpc"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub "${ResourcePrefix}-alb-sg"
      Tags:
        - {Key: Project, Value: llm-inference}
        - {Key: Model, Value: !Ref ModelName}

  # LiteLLM router → vLLM (Cloud Map) ingress. This rule is owned by the
  # router stack (not the cluster stack) so the GpuTaskSg can be created
  # before any router exists, and so multiple router stacks can each open
  # their own ingress without colliding.
  GpuTaskIngressFromRouter:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId:
        Fn::ImportValue: !Sub "${ResourcePrefix}-gpu-task-sg"
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      SourceSecurityGroupId: !Ref RouterSg
      # Allowed SG description chars: a-zA-Z0-9. _-:/()#,@[]+=&;{}!$* (no ">").
      Description: !Sub "litellm-${ModelName} to vllm:8000"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      # Name intentionally omitted: AWS limits TargetGroup names to 32
      # characters, and "${ResourcePrefix}-llm-${ModelName}-tg" overflows
      # that for the longer designated models (e.g.
      # "llm-inference-rt-llm-medgemma-27b-tg" is 36 chars,
      # "llm-inference-rt-llm-llama-4-scout-tg" is 37). CFN-generated names
      # are guaranteed unique within the account/region and never overflow.
      # Consumers reference the TG by ARN (Outputs.TargetGroupArn), not name.
      Port: 4000
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub "${ResourcePrefix}-vpc"
      TargetType: ip
      HealthCheckPath: /health/liveliness
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher: {HttpCode: 200}
      TargetGroupAttributes:
        # deregistration_delay MUST be >= LiteLLM's *retry-amplified* total
        # per-request budget: ``timeout`` × (1 + ``num_retries``). The
        # config below sets timeout=600 and num_retries=2, so an in-flight
        # non-streaming request can occupy the connection for up to
        # 600 × 3 = 1800s (attempt 1 hits the per-attempt 600s, retry 2
        # also hits 600s, retry 3 finally succeeds on the long tail).
        # During a Fargate scale-in or rolling deploy, ALB waits this many
        # seconds for in-flight requests to complete before forcefully
        # closing the connection; a 600s drain would 504 every long-tail
        # in-flight request whose retry budget extended past the first
        # attempt. Sizing this to the per-attempt timeout (600s) was bug
        # #16; not multiplying by (1+num_retries) was the latent shape
        # bug #18 fixes.
        - {Key: deregistration_delay.timeout_seconds, Value: "1800"}

  ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !If
        - UseExplicitListenerArn
        - !Ref ListenerArn
        - !If
          - UseHttps
          - Fn::ImportValue: !Sub "${ResourcePrefix}-alb-https-listener"
          - Fn::ImportValue: !Sub "${ResourcePrefix}-alb-http-listener"
      Priority: !Ref AlbListenerPriority
      Conditions:
        - Field: path-pattern
          Values: [!Ref PathPrefix]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ResourcePrefix}-litellm-${ModelName}"
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !GetAtt TaskExecRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: litellm
          Image: !Ref LiteLLMImage
          Essential: true
          PortMappings: [{ContainerPort: 4000, Protocol: tcp}]
          # ECS Fargate caps StopTimeout at 120s. ALB
          # ``deregistration_delay`` (1800s) covers the bulk of the
          # in-flight drain — ECS only sends SIGTERM after the ALB has
          # finished draining the target — but a request that arrived
          # near the end of the drain window can still be in-flight at
          # SIGTERM. Default StopTimeout is 30s; bumping to 120s gives
          # the Fargate task the maximum allowed grace period to flush
          # any straggling in-flight responses before SIGKILL. Same
          # audit shape as the vLLM container's StopTimeout fix
          # (#21), but capped by Fargate's hard limit.
          StopTimeout: 120
          Environment:
            - Name: LITELLM_MODE
              Value: "proxy"
            - Name: LITELLM_CONFIG_YAML
              Value: !Sub |
                model_list:
                  - model_name: ${ServedModelName}
                    litellm_params:
                      model: openai/${ServedModelName}
                      api_base: http://vllm-${ModelName}.${ResourcePrefix}.local:8000/v1
                      api_key: os.environ/VLLM_API_KEY
                litellm_settings:
                  drop_params: true
                  set_verbose: false
                  # Streaming: surface usage stats on the final SSE chunk so
                  # downstream observability (Prometheus, OpenTelemetry) sees
                  # token counts even when clients use stream=true. Without
                  # this, the streaming path emits chunks with empty `usage`
                  # and the final aggregate is lost.
                  stream_options:
                    include_usage: true
                router_settings:
                  routing_strategy: simple-shuffle
                  num_retries: 2
                  timeout: 600
                  # Resilience: cool a target off for 30s after 3 consecutive
                  # failures so a flapping vLLM target doesn't keep eating
                  # retries. ALB target deregistration covers permanent
                  # outages; this covers transient HTTP 5xx during model
                  # restart / scale-out warmup.
                  allowed_fails: 3
                  cooldown_time: 30
                general_settings:
                  master_key: os.environ/LITELLM_MASTER_KEY
          Secrets:
            - {Name: LITELLM_MASTER_KEY, ValueFrom: !Ref LiteLLMMasterKeySecretArn}
            - {Name: VLLM_API_KEY,       ValueFrom: !Ref VllmApiKeySecretArn}
          # The ghcr.io/berriai/litellm image ships an ENTRYPOINT that
          # exec's litellm directly, so a bare `Command` would land as
          # arguments to `litellm` (not a shell). Override EntryPoint to
          # `bash -lc` so the config-writing one-liner runs first; that
          # script ends with `litellm --config ...` which is what the
          # default entrypoint would have launched.
          EntryPoint: ["/bin/bash", "-lc"]
          Command:
            - "printf '%s' \"$LITELLM_CONFIG_YAML\" > /app/config.yaml && exec litellm --config /app/config.yaml --port 4000 --host 0.0.0.0"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: litellm

  Service:
    Type: AWS::ECS::Service
    DependsOn: ListenerRule
    Properties:
      ServiceName: !Sub "${ResourcePrefix}-litellm-${ModelName}"
      Cluster:
        Fn::ImportValue: !Sub "${ResourcePrefix}-cluster"
      LaunchType: FARGATE
      DesiredCount: 2
      TaskDefinition: !Ref TaskDef
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Split
            - ","
            - Fn::ImportValue: !Sub "${ResourcePrefix}-private-subnets"
          SecurityGroups: [!Ref RouterSg]
      LoadBalancers:
        - {ContainerName: litellm, ContainerPort: 4000, TargetGroupArn: !Ref TargetGroup}
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - {Key: Project, Value: llm-inference}
        - {Key: Model, Value: !Ref ModelName}
      PropagateTags: SERVICE

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ResourceId: !Sub
        - "service/${Cluster}/${ServiceName}"
        - Cluster:
            Fn::ImportValue: !Sub "${ResourcePrefix}-cluster"
          ServiceName: !GetAtt Service.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      MinCapacity: 2
      MaxCapacity: 10
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"

  ScalingPolicyReqPerTarget:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ResourcePrefix}-litellm-${ModelName}-rpt"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 200
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          # ResourceLabel must be "app/<alb-name>/<alb-id>/targetgroup/<tg-name>/<tg-id>".
          # AlbFullName comes from splitting the ALB ARN on "loadbalancer/" and taking
          # the second half. TgFullName is GetAtt-able directly as "targetgroup/<name>/<id>".
          ResourceLabel: !Sub
            - "${AlbFullName}/${TgFullName}"
            - AlbFullName: !Select
                - 1
                - !Split
                  - "loadbalancer/"
                  - Fn::ImportValue: !Sub "${ResourcePrefix}-alb-arn"
              TgFullName: !GetAtt TargetGroup.TargetGroupFullName
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

Outputs:
  AlbDns:
    Value:
      Fn::ImportValue: !Sub "${ResourcePrefix}-alb-dns"
  TargetGroupArn:
    Value: !Ref TargetGroup
  ServiceName:
    Value: !GetAtt Service.Name
