AWSTemplateFormatVersion: "2010-09-09"
Description: >
  llm-inference real-time/ecs networking — DEV-ONLY variant for smoke
  testing without an ACM certificate.

  Differences from the production ``00-networking.yaml``:
    1. The ``AlbCertificateArn`` parameter is optional (defaults to "").
    2. When no cert is supplied, an HTTP listener on :80 is created
       returning a fixed 404 with no target group.
    3. Port-80 ingress is added to the ALB SG (cert-less path only).

  No actual workload traffic flows over plaintext: the HTTP listener has
  no target group attached, and is only present in the cert-less path
  for end-to-end smoke testing of the deploy/teardown plumbing.

  DO NOT use this template for production. The shipped/audited template
  is ``00-networking.yaml``, which has zero plaintext-listener resources.

  Outputs are referenced by stacks 10, 20, 30 (same shape as the prod
  template).

Parameters:
  ResourcePrefix:
    Type: String
    Default: llm-inference-rt
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  AlbCertificateArn:
    Type: String
    Default: ""
    Description: >
      Optional ACM certificate ARN. If empty, the stack creates an
      HTTP-only listener that returns a fixed 404. To deploy a real
      production endpoint, switch to ``00-networking.yaml`` instead.
  AllowedClientCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      CIDR block allowed to reach the ALB. Defaults to 0.0.0.0/0.

Conditions:
  HasCert: !Not [!Equals [!Ref AlbCertificateArn, ""]]
  NoCert: !Equals [!Ref AlbCertificateArn, ""]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name, Value: !Sub "${ResourcePrefix}-vpc"}
        - {Key: Project, Value: llm-inference}

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Project, Value: llm-inference}
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref Vpc, InternetGatewayId: !Ref Igw}

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [2, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [4, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [5, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [2, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]

  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw
  PublicAssocA: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRt}}
  PublicAssocB: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRt}}
  PublicAssocC: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PublicSubnetC, RouteTableId: !Ref PublicRt}}

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttach
    Properties: {Domain: vpc}
  Nat:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA

  PrivateRt:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRt
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Nat
  PrivateAssocA: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRt}}
  PrivateAssocB: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRt}}
  PrivateAssocC: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PrivateSubnetC, RouteTableId: !Ref PrivateRt}}

  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public-facing ALB ingress (dev)
      VpcId: !Ref Vpc
      Tags: [{Key: Project, Value: llm-inference}]

  AlbSgIngressHttps:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AlbSg
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AllowedClientCidr
      Description: HTTPS from allowed clients

  AlbSgIngressHttp:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: NoCert
    Properties:
      GroupId: !Ref AlbSg
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: !Ref AllowedClientCidr
      Description: HTTP fixed-404 (cert-less dev only)

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ResourcePrefix}-alb"
      Scheme: internet-facing
      Type: application
      Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]
      SecurityGroups: [!Ref AlbSg]
      LoadBalancerAttributes:
        - {Key: idle_timeout.timeout_seconds, Value: "1800"}
        - {Key: routing.http2.enabled, Value: "true"}
      Tags:
        - {Key: Project, Value: llm-inference}

  # HTTP listener — only when no cert is supplied. Returns a fixed 404
  # with no target group attached, so no plaintext workload traffic ever
  # exists. Exists purely to let the deploy/teardown plumbing be smoke-
  # tested without an ACM cert.
  AlbListenerHttp:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: NoCert
    Properties:
      LoadBalancerArn: !Ref Alb
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            ContentType: text/plain
            MessageBody: "no route"

  AlbListenerHttps:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCert
    Properties:
      LoadBalancerArn: !Ref Alb
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates: [{CertificateArn: !Ref AlbCertificateArn}]
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig: {StatusCode: "404", ContentType: text/plain, MessageBody: "no route"}

  CloudMapNs:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub "${ResourcePrefix}.local"
      Vpc: !Ref Vpc

Outputs:
  VpcId: {Value: !Ref Vpc, Export: {Name: !Sub "${ResourcePrefix}-vpc"}}
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]]
    Export: {Name: !Sub "${ResourcePrefix}-public-subnets"}
  PrivateSubnetIds:
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]]
    Export: {Name: !Sub "${ResourcePrefix}-private-subnets"}
  AlbArn: {Value: !Ref Alb, Export: {Name: !Sub "${ResourcePrefix}-alb-arn"}}
  AlbDns: {Value: !GetAtt Alb.DNSName, Export: {Name: !Sub "${ResourcePrefix}-alb-dns"}}
  AlbHttpListenerArn:
    Condition: NoCert
    Value: !Ref AlbListenerHttp
    Export: {Name: !Sub "${ResourcePrefix}-alb-http-listener"}
  AlbHttpsListenerArn:
    Condition: HasCert
    Value: !Ref AlbListenerHttps
    Export: {Name: !Sub "${ResourcePrefix}-alb-https-listener"}
  AlbSgId: {Value: !Ref AlbSg, Export: {Name: !Sub "${ResourcePrefix}-alb-sg"}}
  CloudMapNsId:
    Value: !Ref CloudMapNs
    Export: {Name: !Sub "${ResourcePrefix}-cloudmap-ns"}
  CloudMapNsName:
    Value: !Sub "${ResourcePrefix}.local"
    Export: {Name: !Sub "${ResourcePrefix}-cloudmap-ns-name"}
