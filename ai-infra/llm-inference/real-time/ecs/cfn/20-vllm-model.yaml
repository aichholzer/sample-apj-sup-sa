AWSTemplateFormatVersion: "2010-09-09"
Description: >
  llm-inference real-time/ecs vLLM model service. One stack per model -- contains
  the task definition, ECS service, and AWS Cloud Map service registration so
  LiteLLM can resolve replicas via DNS.

Parameters:
  ResourcePrefix:
    Type: String
    Default: llm-inference-rt
  ModelName:
    Type: String
    Description: Short DNS-label-safe model id (e.g. qwen3-8b, medgemma-27b, llama-4-scout).
  HfModelId:
    Type: String
    Description: HuggingFace model id (e.g. Qwen/Qwen3-8B).
  ServedModelName:
    Type: String
  VllmImage:
    Type: String
    Default: "vllm/vllm-openai:v0.20.2"
  TensorParallel:
    Type: Number
    Default: 1
  DataParallel:
    Type: Number
    Default: 1
  GpuCount:
    Type: Number
    Default: 1
    Description: GPU resource reservation per task (== TP * PP).
  MaxModelLen:
    Type: Number
    Default: 16384
  ExtraServeFlags:
    Type: String
    Default: ""
    Description: Optional extra flags appended to vllm serve (e.g. --kv-cache-dtype fp8).
  ExtraEnvVarsJson:
    Type: String
    Default: "{}"
    Description: >
      Optional plan-author-provided env vars rendered as a JSON object
      (e.g. {"VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8":"1"}). Parsed in the
      container entrypoint and exported into the env before `vllm serve`
      runs. Reserved keys (HF_TOKEN, VLLM_API_KEY, etc) are filtered out
      defensively; the model_service helper validates names too.
  TransformersOverridePackage:
    Type: String
    Default: ""
    Description: >
      Optional pip package to install before launching vLLM. Used for
      Qwen3-VL-30B-A3B which needs transformers>=4.57 to expose
      Qwen3VLMoeForConditionalGeneration. Empty string = no override.
  HfTokenSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN holding HF token. Required for gated models.
  VllmApiKeySecretArn:
    Type: String
    Description: Secrets Manager ARN for the bearer token vLLM accepts.
  DesiredCount:
    Type: Number
    Default: 1
  TaskCpu:
    Type: Number
    Default: 4096
  TaskMemoryMiB:
    Type: Number
    Default: 16384
  HealthCheckInterval:
    Type: Number
    Default: 60
    MinValue: 5
    MaxValue: 300
    Description: >
      Seconds between vLLM /health probes. After the StartPeriod expires,
      `Retries` consecutive failures kill the container. Total post-startup
      tolerance = HealthCheckRetries * HealthCheckInterval seconds. Bump
      this for models whose first /health success takes longer than the
      default budget — e.g. Llama-4-Scout's 218 GiB BF16 weights take
      20-75 min to download from HuggingFace, easily exceeding the
      default 10-min retry window.
  HealthCheckRetries:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 10
    Description: >
      Consecutive /health failures (after StartPeriod) before the
      container is killed. ECS hard-caps this at 10.
  LogGroupKmsKeyArn:
    Type: String
    Default: ""
    Description: >
      Optional KMS key ARN for at-rest encryption of the CloudWatch Log
      Group. Defaults to AWS-managed encryption (CloudWatch encrypts at
      rest by default). For higher compliance requirements, supply a
      customer-managed CMK ARN.

Conditions:
  HasHfToken: !Not [!Equals [!Ref HfTokenSecretArn, ""]]
  HasLogGroupKmsKey: !Not [!Equals [!Ref LogGroupKmsKeyArn, ""]]

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    # CloudWatch Logs encrypts log data at rest using AWS-managed keys by
    # default. Pass LogGroupKmsKeyArn to use a customer-managed CMK.
    Properties:
      LogGroupName: !Sub "/ecs/${ResourcePrefix}/vllm-${ModelName}"
      RetentionInDays: 14
      KmsKeyId: !If [HasLogGroupKmsKey, !Ref LogGroupKmsKeyArn, !Ref AWS::NoValue]
      Tags:
        - {Key: Project, Value: llm-inference}
        - {Key: Model, Value: !Ref ModelName}

  # Managed policy (rather than inline) so the policy resource shows up
  # in the IAM API independently of the role and can be audited / shared.
  ReadSecretsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-vllm-${ModelName}-read-secrets"
      Description: !Sub "Read the vLLM API key (and optional HF token) for ${ModelName}."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: [secretsmanager:GetSecretValue]
            Resource:
              - !Ref VllmApiKeySecretArn
              - !If [HasHfToken, !Ref HfTokenSecretArn, !Ref AWS::NoValue]

  TaskExecRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - !Ref ReadSecretsPolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  TaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ResourcePrefix}-vllm-${ModelName}"
      NetworkMode: awsvpc
      RequiresCompatibilities: [EC2]
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemoryMiB
      ExecutionRoleArn: !GetAtt TaskExecRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: vllm
          Image: !Ref VllmImage
          Essential: true
          ResourceRequirements:
            - {Type: GPU, Value: !Sub "${GpuCount}"}
          PortMappings:
            - {ContainerPort: 8000, Protocol: tcp}
          # Container drain budget. ECS sends SIGTERM, then SIGKILL after
          # StopTimeout. Default is 30s on EC2 launch type — far shorter
          # than a single in-flight decode request, which LiteLLM is
          # already willing to wait up to ``router_settings.timeout: 600``
          # for. If a task is replaced (scale-in, rolling deploy, ASG
          # rebalance, spot reclaim) mid-decode and StopTimeout < the
          # upstream wait, the in-flight client request 502s before the
          # decode would have completed. 600s here matches LiteLLM's
          # per-attempt upstream timeout — one full in-flight request can
          # drain before SIGKILL. Same audit shape as the ALB
          # idle_timeout / TG drain (#15/#18) but for the *container's
          # own* drain rather than the ALB's view of it. EC2 launch type
          # caps StopTimeout at 7200s; 600s is well within that.
          StopTimeout: 600
          LinuxParameters:
            SharedMemorySize: 16384
          Environment:
            - {Name: HF_HUB_ENABLE_HF_TRANSFER, Value: "1"}
            # vLLM reads logging level from VLLM_LOGGING_LEVEL (not
            # VLLM_LOG_LEVEL — the latter triggers `Unknown vLLM
            # environment variable detected: VLLM_LOG_LEVEL` warnings on
            # every container start, observed live on v0.20.2).
            - {Name: VLLM_LOGGING_LEVEL, Value: INFO}
          Secrets:
            - !If
              - HasHfToken
              - {Name: HF_TOKEN, ValueFrom: !Ref HfTokenSecretArn}
              - !Ref AWS::NoValue
            - {Name: VLLM_API_KEY, ValueFrom: !Ref VllmApiKeySecretArn}
          # The vllm/vllm-openai image ships ENTRYPOINT ["python3", "-m",
          # "vllm.entrypoints.openai.api_server"] (older tags) or ["vllm",
          # "serve"] (newer tags). ECS's Command is Docker's CMD (appended to
          # ENTRYPOINT), NOT a shell — so a bare Command like
          # [/bin/bash, -lc, "vllm serve ..."] would land as positional args
          # to the entrypoint, and the container would crash trying to
          # interpret "/bin/bash" as a model id (or a subcommand). Override
          # EntryPoint to ["/bin/bash", "-lc"] so our shell command runs as a
          # script; it ends with `exec vllm serve ...` so SIGTERM still
          # reaches the python process cleanly during ECS scale-in.
          EntryPoint: ["/bin/bash", "-lc"]
          Command:
            # ExtraEnvVarsJson is a JSON object (default "{}"). We parse it
            # with python3 (always available in the vLLM image), filter out
            # reserved keys defensively, and emit `export K=V` lines that
            # are eval'd before `vllm serve`. TransformersOverridePackage
            # (e.g. "transformers>=4.57") is pip-installed before serve to
            # keep the image generic — model packages declare what they need.
            - !Sub >
              set -e;
              if [[ -n "${TransformersOverridePackage}" ]]; then
                echo "[entrypoint] pip install --no-cache-dir ${TransformersOverridePackage}";
                pip install --no-cache-dir "${TransformersOverridePackage}";
              fi;
              EXTRA_EXPORTS="$(python3 -c "import json,sys,re; reserved={'HF_TOKEN','HUGGING_FACE_HUB_TOKEN','VLLM_API_KEY','HF_HOME'}; r=re.compile(r'^[A-Z_][A-Z0-9_]*$'); d=json.loads(sys.argv[1]); print('\n'.join(f'export {k}={json.dumps(str(v))}' for k,v in d.items() if r.match(k) and k not in reserved))" '${ExtraEnvVarsJson}')";
              eval "$EXTRA_EXPORTS";
              exec vllm serve ${HfModelId}
              --served-model-name ${ServedModelName}
              --tensor-parallel-size ${TensorParallel}
              --data-parallel-size ${DataParallel}
              --max-model-len ${MaxModelLen}
              --enable-prefix-caching
              --api-key $VLLM_API_KEY
              --host 0.0.0.0
              --port 8000
              ${ExtraServeFlags}
          HealthCheck:
            # ECS caps StartPeriod at 300s and Retries at 10. The total grace
            # period before ECS kills an unhealthy container is:
            #   StartPeriod + (Retries * Interval)
            # During StartPeriod, /health failures DO NOT count. After
            # StartPeriod, `Retries` consecutive failures (spaced by
            # `Interval`) kill the task.
            #
            # Defaults give 300 + 10*60 = 15 min total — fine for Qwen3-8B
            # (~17 GiB weights, downloads in 1-3 min) and MedGemma-27B
            # (~55 GiB, 5-15 min) but NOT for Llama-4-Scout (218 GiB,
            # 18-75 min from HF). The notebook overrides Interval to 300
            # for the 8-GPU plan, raising total tolerance to
            # 300 + 10*300 = ~55 min.
            Command: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
            Interval: !Ref HealthCheckInterval
            Timeout: 5
            Retries: !Ref HealthCheckRetries
            StartPeriod: 300
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: vllm

  CloudMapService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: !Sub "vllm-${ModelName}"
      NamespaceId:
        Fn::ImportValue: !Sub "${ResourcePrefix}-cloudmap-ns"
      DnsConfig:
        DnsRecords: [{Type: A, TTL: 10}]
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig: {FailureThreshold: 1}

  Service:
    Type: AWS::ECS::Service
    DependsOn: TaskDef
    Properties:
      ServiceName: !Sub "${ResourcePrefix}-vllm-${ModelName}"
      Cluster:
        Fn::ImportValue: !Sub "${ResourcePrefix}-cluster"
      TaskDefinition: !Ref TaskDef
      DesiredCount: !Ref DesiredCount
      # Use the cluster's spot+on-demand capacity providers (NOT LaunchType:EC2)
      # so managed scaling on the ASGs actually fires when this service has
      # pending tasks. With LaunchType:EC2 the service ignores the capacity
      # providers entirely; since both ASGs ship with DesiredCapacity=0 and
      # no other scaling signal, tasks would queue PENDING forever.
      CapacityProviderStrategy:
        - CapacityProvider:
            Fn::ImportValue: !Sub "${ResourcePrefix}-cp-spot"
          Weight: 4
          Base: 0
        - CapacityProvider:
            Fn::ImportValue: !Sub "${ResourcePrefix}-cp-od"
          Weight: 1
          Base: 0
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Split
            - ","
            - Fn::ImportValue: !Sub "${ResourcePrefix}-private-subnets"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ResourcePrefix}-gpu-task-sg"
      ServiceRegistries:
        # Cloud Map A-record registration (no SRV): containerName/containerPort
        # are NOT permitted by ECS for DNS-A namespaces. The service publishes
        # the task ENI's private IP; clients connect to port 8000 directly.
        - RegistryArn: !GetAtt CloudMapService.Arn
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - {Key: Project, Value: llm-inference}
        - {Key: Model, Value: !Ref ModelName}
      PropagateTags: SERVICE

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ResourceId: !Sub
        - "service/${Cluster}/${ServiceName}"
        - Cluster:
            Fn::ImportValue: !Sub "${ResourcePrefix}-cluster"
          ServiceName: !GetAtt Service.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      MinCapacity: 1
      MaxCapacity: 4
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"

  # vLLM tasks are fronted by Cloud Map (not an ALB), so we can't scale on
  # ALBRequestCountPerTarget here -- LiteLLM does that. Scale vLLM on CPU
  # utilization as a coarse signal that the model server is busy. Cooldowns
  # are asymmetric: scale-out is fast (60s) so a load burst pulls in a new
  # GPU promptly, scale-in is slow (600s) because vLLM cold start is slow
  # and we don't want to thrash. Replace with a custom metric (e.g. vLLM's
  # exported `vllm:num_requests_running` via Prometheus -> CloudWatch) for
  # a sharper signal in production.
  ScalingPolicyCpu:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ResourcePrefix}-vllm-${ModelName}-cpu"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 600

Outputs:
  CloudMapServiceName:
    Value: !Sub "vllm-${ModelName}.${ResourcePrefix}.local"
    Export: {Name: !Sub "${ResourcePrefix}-vllm-${ModelName}-dns"}
  ServiceName:
    Value: !GetAtt Service.Name
  TaskDefArn:
    Value: !Ref TaskDef
