AWSTemplateFormatVersion: "2010-09-09"
Description: >
  llm-inference real-time/ecs networking (one-time per region) — production
  template. Requires an ACM certificate ARN; the ALB exposes only an HTTPS
  listener on port 443 with TLS 1.3+ baseline policy. There is no plaintext
  HTTP listener and no port-80 ingress on the ALB security group, so no
  client request bytes ever traverse the load balancer in cleartext.

  For local-only smoke testing without a cert, deploy
  ``00-networking-dev.yaml`` instead. That template adds an HTTP:80 listener
  that returns a fixed 404. It is dev-only and out of scope for production
  deploys / public publication.

  Outputs are referenced by stacks 10, 20, 30.

Parameters:
  ResourcePrefix:
    Type: String
    Default: llm-inference-rt
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  AlbCertificateArn:
    Type: String
    AllowedPattern: "^arn:aws[a-zA-Z-]*:acm:[a-z0-9-]+:[0-9]{12}:certificate/.+$"
    ConstraintDescription: >-
      AlbCertificateArn must be a non-empty ACM certificate ARN. For dev
      smoke testing without a cert, use 00-networking-dev.yaml instead.
    Description: >
      ACM certificate ARN for the HTTPS listener. Required — the production
      template does not create a plaintext HTTP listener.
  AllowedClientCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      CIDR block allowed to reach the ALB. Defaults to 0.0.0.0/0 for the
      reference deployment. Override with a tighter CIDR (corporate VPN,
      VPC peer, etc.) or pair with WAF / AWS Shield for production.

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name, Value: !Sub "${ResourcePrefix}-vpc"}
        - {Key: Project, Value: llm-inference}

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Project, Value: llm-inference}
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref Vpc, InternetGatewayId: !Ref Igw}

  # Public subnets host only the ALB and NAT Gateway. Tasks run in the
  # private subnets and reach the internet via NAT, so MapPublicIpOnLaunch
  # is intentionally left at the default (false) — the ALB receives traffic
  # via its own elastic ENIs, and EC2 hosts never land in public subnets.
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [2, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [4, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]
  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [5, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [2, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags: [{Key: Project, Value: llm-inference}]

  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  # The 0.0.0.0/0 → IGW route is required for the public-facing ALB to
  # receive client traffic. Tasks themselves run in private subnets and
  # egress through the NAT Gateway, not this route.
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Metadata:
      checkov:
        skip:
          - id: CKV2_AWS_60
            comment: Public route to IGW is required for the internet-facing ALB.
      cfn_nag:
        rules_to_suppress:
          - id: W34
            reason: Public-facing ALB requires 0.0.0.0/0 → IGW route.
      guard:
        SuppressedRules:
          - NO_UNRESTRICTED_ROUTE_TO_IGW
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw
  PublicAssocA: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRt}}
  PublicAssocB: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRt}}
  PublicAssocC: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PublicSubnetC, RouteTableId: !Ref PublicRt}}

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttach
    Properties: {Domain: vpc}
  Nat:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA

  PrivateRt:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref Vpc}
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRt
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Nat
  PrivateAssocA: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRt}}
  PrivateAssocB: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRt}}
  PrivateAssocC: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {SubnetId: !Ref PrivateSubnetC, RouteTableId: !Ref PrivateRt}}

  # Internet-facing ALB security group.
  #
  # Only port 443 from AllowedClientCidr is permitted. Tighten via
  # ``AllowedClientCidr``, WAF, or AWS Shield for production deployments.
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W2
            reason: >-
              Public-facing ALB. Port 443 ingress from AllowedClientCidr is
              the intended reachability surface for an internet endpoint.
          - id: W9
            reason: Public-facing ALB; 0.0.0.0/0 default is required.
    Properties:
      GroupDescription: Public-facing ALB ingress
      VpcId: !Ref Vpc
      Tags: [{Key: Project, Value: llm-inference}]

  # Port 443 ingress.
  AlbSgIngressHttps:
    Type: AWS::EC2::SecurityGroupIngress
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W9
            reason: Public-facing ALB; 0.0.0.0/0 default is required.
      guard:
        SuppressedRules:
          - EC2_SECURITY_GROUP_INGRESS_OPEN_TO_WORLD_RULE
    Properties:
      GroupId: !Ref AlbSg
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AllowedClientCidr
      Description: HTTPS from allowed clients

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ResourcePrefix}-alb"
      Scheme: internet-facing
      Type: application
      Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]
      SecurityGroups: [!Ref AlbSg]
      LoadBalancerAttributes:
        # idle_timeout MUST be >= LiteLLM's *retry-amplified* total wall-
        # clock budget per request: ``timeout`` (per attempt) × (1 +
        # ``num_retries``). With ``router_settings.timeout: 600`` and
        # ``num_retries: 2``, a worst-case non-streaming request that
        # times out twice and finally succeeds on attempt 3 occupies the
        # same client-facing TCP connection for up to 600 × 3 = 1800s
        # with no bytes flowing back. SSE streaming workloads are
        # unaffected — bytes flow continuously and idle_timeout resets
        # on each flush.
        - {Key: idle_timeout.timeout_seconds, Value: "1800"}
        - {Key: routing.http2.enabled, Value: "true"}
      Tags:
        - {Key: Project, Value: llm-inference}

  AlbListenerHttps:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Protocol: HTTPS
      Port: 443
      # TLS 1.3 with TLS 1.2 fallback. ELBSecurityPolicy-TLS13-1-2-2021-06
      # is AWS's recommended baseline policy that disables TLS 1.0/1.1 and
      # all anonymous / export ciphers.
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates: [{CertificateArn: !Ref AlbCertificateArn}]
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig: {StatusCode: "404", ContentType: text/plain, MessageBody: "no route"}

  CloudMapNs:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub "${ResourcePrefix}.local"
      Vpc: !Ref Vpc

Outputs:
  VpcId: {Value: !Ref Vpc, Export: {Name: !Sub "${ResourcePrefix}-vpc"}}
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB, !Ref PublicSubnetC]]
    Export: {Name: !Sub "${ResourcePrefix}-public-subnets"}
  PrivateSubnetIds:
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB, !Ref PrivateSubnetC]]
    Export: {Name: !Sub "${ResourcePrefix}-private-subnets"}
  AlbArn: {Value: !Ref Alb, Export: {Name: !Sub "${ResourcePrefix}-alb-arn"}}
  AlbDns: {Value: !GetAtt Alb.DNSName, Export: {Name: !Sub "${ResourcePrefix}-alb-dns"}}
  AlbHttpsListenerArn:
    Value: !Ref AlbListenerHttps
    Export: {Name: !Sub "${ResourcePrefix}-alb-https-listener"}
  AlbSgId: {Value: !Ref AlbSg, Export: {Name: !Sub "${ResourcePrefix}-alb-sg"}}
  CloudMapNsId:
    Value: !Ref CloudMapNs
    Export: {Name: !Sub "${ResourcePrefix}-cloudmap-ns"}
  CloudMapNsName:
    Value: !Sub "${ResourcePrefix}.local"
    Export: {Name: !Sub "${ResourcePrefix}-cloudmap-ns-name"}
